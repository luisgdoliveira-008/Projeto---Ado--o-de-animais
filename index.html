<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Formulário De Adoção</title>   
</head>

<header>
  <body>
    <nav class="titulo_fixado">
      <h1>ADOÇÃO DE PETS</h1>
        <img id="icon" src="assets/ilustracao-de-um-desenho-de-cachorrinho-fofo_991386-35.avif" alt="dog">
    </nav>
</header>
    
    <div class="formulario">
        <form id="formAdocao">
            <br>
              <center><h3>RESPONDA O FORMULÁRIO</h3>
            <br>
              <center><label for="nome">Nome:</label>
                <br>
            <input type="text" id="nome" placeholder="Digite seu nome" required>
            <br>
            <br>
              <center><label for="email">Email:</label>
                <br>
            <input type="email" id="email" placeholder="Digite seu email" required>
            <br>
            <br>
              <center><label for="telefone">Telefone:</label>
                <br>
            <input type="telefone" id="telefone" placeholder="(XX) XXXXX-XXXX" required>
            <br>
            <br>
              <center><label for="cpf">CPF:</label>
                <br>
            <input type="cpf" id="cpf" placeholder="Digite seu CPF" required>
            <br>
            <br>
              <center><label for="idade">Idade:</label>
                <br>
            <input type="idade" id="idade" placeholder="EX: 20" required>
            <br>
            <br>
              <center><label for="cidade">Cidade:</label>
                <br>
                <select name="cidade" id="cidade">
                    <option value="">Selecione</option>
                    <option value="joinville">Joinville</option>
                    <option value="jaragua">jaraguá</option>
                    <option value="sao_bento">São Bento do Sul</option>
                </select>
            <br>
            <br>
              <center><label for="moradia">Moradia:</label>
                <br>
                <select name="moradia" id="moradia">
                    <option value="">Selecione</option>
                    <option value="casa">Casa</option>
                    <option value="apartamento">Apartamento</option>
                </select>
            <br>
            <br>
              <center><label for="quintal">Possui Quintal?</label>
            <input type="radio" name="quintal" value="sim">Sim 
            <input type="radio" name="quintal" value="nao">Não
            <br>
            <br>
              <center><label for="pet">Já teve pet antes?</label>
            <input type="radio" name="pet" value="sim">Sim
            <input type="radio" name="pet" value="nao">Não
            <br>
            <br>
              <center><label for="horas">Quantas horas o animal ficará sozinho por dia?</label>
            <br>
            <input type="radio" name="horas" value="nao">+ de 8 horas
            <input type="radio" name="horas" value="sim">- de 8 horas
            <br>
            <br>
              <center><label for="motivo">Motivo da adoção:</label>
            <br>
            <textarea id="motivo" name="motivo" rows="2" cols="50" required></textarea>
            <br>
            <br>
              <center><label for="aceitar">Aceite o termo de responsabilidade</label>
            <input type="checkbox" id="aceitar" name="aceitar" value="aceitarTermos" required>
            <br>
            <br>
            <center><button type="submit">🐕</button></center>
        </form>
    </div>
    <div id="resultado"></div>
     <img id="cachorro" src="assets/gif cachorro.webp" alt="gif">


    <script src="scripts/script.js"></script>

</body>

</html>
